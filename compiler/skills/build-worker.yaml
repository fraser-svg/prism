name: build-worker
display_name: Build Worker
version: 1.0.0
description: >
  Executes a single scoped build task from a decomposed dependency graph. Reads
  only the files and contracts it needs, writes working code, and returns a file
  manifest for verification and contract extraction.

trigger_patterns:
  - "TASK: .+"
  - "build worker .+"
  - "implement .+ (task|worker)"
  - "worker dispatch"

purpose: >
  Implements one decomposed unit of work from the Stage 3 dependency graph. Each
  worker is deliberately context-limited — it sees only its task, the files it must
  read, hard constraints from the spec, and validated contracts from prior workers.
  This isolation prevents context bleed between workers and keeps each dispatch
  fast and focused.

inputs:
  - name: task
    type: string
    required: true
    description: >
      Plain-English description of exactly what this worker must implement.
      Should map to 1-3 spec requirements.
  - name: files_to_read
    type: array
    required: true
    description: >
      List of relative file paths (max 10) the worker must read before starting.
      Includes relevant source files, types, and API definitions.
  - name: constraints
    type: string
    required: true
    description: >
      Hard constraints from the spec and PRODUCT.md Architecture Decisions.
      Workers MUST NOT violate these (e.g., "Use PostgreSQL, not SQLite").
  - name: shared_context
    type: string
    required: false
    description: >
      Validated exported symbols, interfaces, and API contracts from prior workers
      that this worker depends on. Extracted from .prism/contracts/{worker-id}.json.
  - name: project_root
    type: filepath
    required: true
    description: Absolute path to the project root.
  - name: worker_id
    type: string
    required: true
    description: >
      Unique identifier for this worker (e.g., "w3"). Used for registry tracking
      and contract storage.

outputs:
  - name: file_manifest
    type: string
    description: >
      Newline-separated list of all files created or modified, relative to
      project_root. The Operator uses this to run prism-verify.sh and extract
      contracts. Must be the last thing returned.
  - name: working_code
    type: file
    description: >
      One or more source files written to disk. Must be syntactically valid and
      satisfy the task constraints.

tool_restrictions:
  allowed:
    - Bash
    - Read
    - Write
    - Edit
    - Grep
    - Glob

references: []

scripts:
  - name: syntax-verify
    path: $SKILL_DIR/scripts/prism-verify.sh
    when: on_complete
  - name: registry-update
    path: $SKILL_DIR/scripts/prism-registry.sh
    when: on_complete

stages:
  - name: read_context
    description: >
      Read all files listed in files_to_read. Read shared_context contracts from
      prior workers. Do NOT read anything outside this list.
    auto_advance: true
  - name: plan_implementation
    description: >
      Silently determine the implementation approach. Identify what to create vs
      modify. Check constraints. No output at this stage.
    auto_advance: true
  - name: write_code
    description: >
      Write all code for this task. Each file should be complete and syntactically
      valid. Do not leave TODO stubs or placeholder implementations.
    auto_advance: true
  - name: self_verify
    description: >
      Re-read each written file and confirm it is syntactically valid and satisfies
      the task constraints. Fix any issues before returning.
    auto_advance: true
  - name: return_manifest
    description: >
      Output the file manifest — a newline-separated list of all files created or
      modified. This MUST be the final output so the Operator can parse it.
    auto_advance: false

rules:
  - "CONTEXT FIREWALL: Read ONLY files_to_read and shared_context. Never read the full spec, user conversation, or other workers' source files."
  - "Never import or depend on files not listed in files_to_read or shared_context."
  - "Code must be complete — no TODO comments, no placeholder implementations, no stub functions."
  - "Constraints are hard limits. If a constraint makes the task impossible, return ERROR with explanation — do not silently ignore it."
  - "The file manifest MUST be the last content in the response, one path per line."
  - "Do not create new directories without listing them in the manifest."
  - "Do not modify files outside the task scope, even if they look broken."
  - "Empty output or unclear output is treated as failure by the Operator. Always return a manifest."
  - "If a dependency's contract is missing from shared_context, halt and return ERROR — do not guess the interface."

examples:
  - input: >
      TASK: Build the user authentication middleware. FILES TO READ: src/types/user.ts,
      src/lib/db.ts. CONSTRAINTS: Use JWT tokens, 24h expiry. No session cookies.
      SHARED CONTEXT: UserType interface from w1.
    expected_behavior: >
      Reads src/types/user.ts and src/lib/db.ts. Writes src/middleware/auth.ts
      with JWT validation logic. Returns manifest: "src/middleware/auth.ts"
  - input: >
      TASK: Create the login API route. FILES TO READ: src/middleware/auth.ts,
      src/types/user.ts. CONSTRAINTS: POST /api/auth/login, return JWT on success,
      400 on invalid credentials.
    expected_behavior: >
      Writes src/app/api/auth/login/route.ts with POST handler. Returns manifest
      listing only modified files.

eval_cases:
  - name: manifest_always_returned
    input: "TASK: Create a hello world function. FILES TO READ: src/index.ts. CONSTRAINTS: TypeScript only."
    expected_output_contains:
      - "src/"
    expected_output_excludes:
      - "TODO"
      - "placeholder"
  - name: constraint_respected
    input: "TASK: Add data storage. FILES TO READ: src/types.ts. CONSTRAINTS: Use PostgreSQL, NOT SQLite."
    expected_output_contains:
      - "postgres"
    expected_output_excludes:
      - "sqlite"
      - "SQLite"
