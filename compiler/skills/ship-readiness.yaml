name: ship-readiness
display_name: Ship Readiness
version: 2.0.0
description: >
  Runs the ship workflow for a completed Prism build: squashes all branch commits
  into one clean conventional commit, creates a rich pull request, optionally
  deploys, archives the spec, updates product memory, and records a durable
  ship receipt.

trigger_patterns:
  - "ship( it)?$"
  - "deploy( this)?$"
  - "create (a )?pull request"
  - "open (a )?pr"
  - "push (to )?(main|prod|production)"
  - "we.re done"
  - "release"

purpose: >
  Closes the loop on a completed build by producing a clean git history, a
  reviewable pull request with rich context from spec entities, optional
  deployment, and updated product memory. The typed bridge CLI handles all git
  operations deterministically — no LLM-guessed git commands.

inputs:
  - name: change_name
    type: string
    required: true
    description: >
      The spec ID / change name (e.g., "add-auth"). Used to locate the spec
      entity, read reviews, and label the commit.
  - name: project_root
    type: filepath
    required: true
    description: Absolute path to the project root.
  - name: base_branch
    type: string
    required: false
    description: >
      Target branch for the PR. Defaults to "main".
  - name: commit_message
    type: string
    required: false
    description: >
      Optional override for the commit message. If omitted, derived from
      the spec entity title and acceptance criteria count.

outputs:
  - name: ship_result
    type: json
    description: >
      Full ship result JSON including squash, push, PR, tag, and deploy status.
  - name: pr_url
    type: string
    description: >
      URL of the created pull request.
  - name: receipt_path
    type: file
    description: >
      Path to the ship receipt JSON at .prism/ships/{specId}/receipt.json.

tool_restrictions:
  allowed:
    - Bash
    - Read
    - Write
    - Edit
    - Grep
    - Glob

scripts:
  - name: registry-archive
    path: $SKILL_DIR/scripts/prism-registry.sh
    when: on_complete
  - name: state-update
    path: $SKILL_DIR/scripts/prism-state.sh
    when: on_complete
  - name: bridge-ship
    path: $BRIDGE ship
    when: core
  - name: bridge-deploy-detect
    path: $BRIDGE deploy-detect
    when: optional
  - name: bridge-deploy-trigger
    path: $BRIDGE deploy-trigger
    when: optional
  - name: bridge-record-ship
    path: $BRIDGE record-ship
    when: on_complete

stages:
  - name: preflight
    description: >
      Verify the build is actually done: run advisory release-state and
      check-reviews batch call. Log results but don't block. If release state
      shows "hold", note missing evidence in the build log.
    auto_advance: false
  - name: ship
    description: >
      Run $BRIDGE ship to squash all commits on the branch into one clean
      conventional commit via git reset --soft to merge-base, push to origin,
      create a rich PR from spec + reviews + verification, and tag the commit.
      Prism owns the branch — all commits are squashed regardless of prefix.
    auto_advance: true
  - name: deploy
    description: >
      Run $BRIDGE deploy-detect to check for deployment platforms (Vercel,
      Netlify, Railway, Fly.io, Render). If detected, ask the user before
      triggering. If auto-deploy is configured, note it. Never auto-trigger.
    auto_advance: false
  - name: archive_and_update
    description: >
      Archive the registry entry, archive the openspec change (best-effort),
      update product memory with "Last Shipped" section, and record the ship
      receipt to .prism/ships/{specId}/receipt.json.
    auto_advance: true
  - name: receipt
    description: >
      Present the structured ship receipt to the user: what was built,
      requirements verified, review verdicts, PR URL, commit, tag, deploy
      status, and what's next. Offer branch cleanup and auto-merge.
    auto_advance: false

rules:
  - "Squash all commits on the branch into one clean conventional commit via git reset --soft to merge-base. Prism owns the branch."
  - "The squash commit message MUST follow conventional commits format (feat:, fix:, chore:)."
  - "Smart commit messages: derive from spec entity title + acceptance criteria count when available."
  - "Rich PR body: include spec summary, requirements checklist, review verdicts table, and verification results in collapsible GitHub sections."
  - "If gh CLI is not installed, output the PR details and tell the user to create it manually."
  - "If push is rejected, fetch + rebase on base branch and retry exactly once. If conflict, abort rebase and report."
  - "Never auto-deploy. Always ask the user before triggering a deploy."
  - "Archive the OpenSpec change only AFTER the PR is successfully created."
  - "Product memory update runs only after archive succeeds — in that order."
  - "Ship receipt is written after all other steps — it captures the complete outcome."
  - "If any step fails, surface to Operator with the exact error — do not silently skip steps."
  - "Each ship step is independently safe — partial completion never leaves broken state."
  - "Git tag uses prism/{specId_slug} derived from spec title, not product/phase."
  - "Branch cleanup and auto-merge are offered but never forced."

examples:
  - input: "add-auth: Ship the authentication feature"
    expected_behavior: >
      Reads spec entity for "add-auth" → "feat: Add JWT Authentication — 3
      requirements verified". Squashes all commits, pushes, creates PR with
      rich body (spec summary, requirements checklist, review table). Tags
      as prism/add-jwt-authentication. Archives spec. Records receipt.
  - input: "user-dashboard: Ship with custom message 'feat: user dashboard v1'"
    expected_behavior: >
      Uses custom commit message override. Creates PR with rich body from
      spec entity. All other steps identical.
  - input: "contact-form: Ship (with Vercel detected)"
    expected_behavior: >
      Ships normally. deploy-detect finds vercel.json. Asks user "Want me
      to deploy?" If yes, triggers vercel --prod with health check.

eval_cases:
  - name: pr_url_returned
    input: "test-feature: Ship"
    expected_output_contains:
      - "github.com"
      - "pull"
    expected_output_excludes:
      - "error"
      - "failed"
  - name: squash_conventional_commit
    input: "add-login: Ship"
    expected_output_contains:
      - "feat:"
    expected_output_excludes:
      - "wip:"
  - name: rich_pr_body
    input: "add-auth: Ship"
    expected_output_contains:
      - "What was built"
      - "Requirements"
      - "Review Results"
  - name: deploy_detect_vercel
    input: "my-app: Ship (vercel.json exists)"
    expected_output_contains:
      - "vercel"
      - "deploy"
  - name: ship_receipt_persisted
    input: "add-auth: Ship"
    expected_output_contains:
      - "receipt"
      - "commitSha"
