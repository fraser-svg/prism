name: spec-generator
display_name: Spec Generator
version: 1.0.0
description: >
  Generates a structured OpenSpec change from sharpened user intent. Writes
  proposal.md and spec.md in the canonical SHALL/WHEN/THEN format, validates
  them, and returns a plain-English summary for user approval.

trigger_patterns:
  - "build me .+"
  - "create .+ (feature|page|api|endpoint|component)"
  - "add .+ to (the )?(app|product|site)"
  - "I (want|need) .+"
  - "spec(ify)? .+"
  - "generate (a )?spec"

purpose: >
  Converts a user's natural-language request (after sharpening questions) into a
  validated OpenSpec change. This is the canonical artifact that Stage 3 Build reads.
  Without a valid spec, nothing gets built — this skill is the bridge between
  intent and execution.

inputs:
  - name: feature_name
    type: string
    required: true
    description: >
      Kebab-case name for the change directory (e.g. "add-auth", "user-dashboard").
      Created by the Operator after sharpening questions.
  - name: summary
    type: string
    required: true
    description: >
      Plain-English summary of what to build, distilled from the sharpening
      conversation. Includes scope, definition of done, and out-of-scope items.
  - name: project_root
    type: filepath
    required: true
    description: Absolute path to the project root (output of git rev-parse --show-toplevel).

outputs:
  - name: proposal_md
    type: file
    description: >
      Written to openspec/changes/{feature_name}/proposal.md. Contains the Why
      and What derived from the sharpening conversation.
  - name: spec_md
    type: file
    description: >
      Written to openspec/changes/{feature_name}/specs/{feature_name}/spec.md.
      Contains formal SHALL/WHEN/THEN requirements (min 2 requirements, min 1
      scenario each).
  - name: plain_english_summary
    type: string
    description: >
      Human-readable checklist returned to the Operator for progressive-disclosure
      approval. Never exposes raw spec syntax to the user.

tool_restrictions:
  allowed:
    - Bash
    - Read
    - Write
    - Edit
    - Grep
    - Glob

references:
  - name: Spec Format Rules
    path: ../../references/spec-format.md
    embed: true
  - name: Product Context
    path: ../../references/product-context.md
    embed: false

scripts:
  - name: openspec-validate
    path: $SKILL_DIR/scripts/prism-verify.sh
    when: on_complete
  - name: auto-save
    path: $SKILL_DIR/scripts/prism-save.sh
    when: on_complete

stages:
  - name: scaffold
    description: >
      Run `openspec new change "{feature_name}"` (or mkdir fallback) to create
      the change directory structure.
    auto_advance: true
  - name: write_proposal
    description: >
      Write proposal.md with the Why (user's goal) and What (scope and out-of-scope)
      derived from the sharpening conversation.
    auto_advance: true
  - name: write_spec
    description: >
      Write spec.md with formal SHALL/WHEN/THEN requirements. Minimum 2 requirements,
      each with at least 1 WHEN/THEN scenario.
    auto_advance: true
  - name: validate
    description: >
      Run `openspec validate "{feature_name}" --type change`. Fix any formatting
      errors before returning. Never return an invalid spec.
    auto_advance: true
  - name: summarize
    description: >
      Extract requirements as a plain-English numbered checklist (no raw spec syntax).
      Return this summary to the Operator for user approval.
    auto_advance: false

rules:
  - "Requirements use exactly ### (3 hashtags). Scenarios use exactly #### (4 hashtags)."
  - "Every requirement MUST use SHALL, SHALL NOT, or MUST — not 'should' or 'will'."
  - "Every requirement MUST have at least one Scenario with WHEN and THEN."
  - "Minimum 2 requirements per spec. Never write an empty or single-requirement spec."
  - "Out of Scope section MUST have at least 1 item."
  - "Use the user's own words in descriptions, not engineering jargon."
  - "Never return raw spec format to the user — always summarize in plain English."
  - "Validate with openspec before returning. Fix issues before surfacing to Operator."
  - "If openspec CLI is not installed, fall back to manual mkdir and skip validate step."
  - "Return the plain-English summary as the output, NOT the file paths."

examples:
  - input: "add-auth: User wants login with Google and email/password"
    expected_behavior: >
      Creates openspec/changes/add-auth/proposal.md and
      openspec/changes/add-auth/specs/add-auth/spec.md with requirements for
      Google OAuth and email/password login, each with WHEN/THEN scenarios.
      Returns a plain-English checklist: "1. Login with Google account, 2. Login
      with email and password, 3. Stay logged in between sessions."
  - input: "user-dashboard: User wants to see their activity feed and profile stats"
    expected_behavior: >
      Creates spec with 2+ requirements for activity feed display and profile
      stats. Validates successfully. Returns: "1. View recent activity feed,
      2. See profile statistics summary."

eval_cases:
  - name: valid_spec_structure
    input: "test-feature: Build a button that sends an email"
    expected_output_contains:
      - "SHALL"
      - "WHEN"
      - "THEN"
      - "### Requirement"
      - "#### Scenario"
    expected_output_excludes:
      - "undefined"
      - "TODO"
  - name: plain_english_summary_returned
    input: "contact-form: Add a contact form with name, email, message fields"
    expected_output_contains:
      - "contact form"
      - "name"
      - "email"
    expected_output_excludes:
      - "SHALL"
      - "openspec"
