<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prism</title>
  <style>
    :root {
      --bg: #faf8f5;
      --surface: #ffffff;
      --surface-2: #f3f0eb;
      --border: #e8e4dd;
      --text: #2c2925;
      --text-muted: #9a9590;
      --accent: #c47830;
      --accent-soft: #b8845a;
      --green: #5a9a6b;
      --yellow: #b8943a;
      --red: #b85a50;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .layout {
      position: relative;
      height: 100vh;
    }

    /* ---- LEFT: Conversation (floating) ---- */
    .conversation {
      position: absolute;
      left: 24px;
      top: 24px;
      bottom: 24px;
      width: 380px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
      background: rgba(180, 156, 132, 0.35);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 28px;
      border: 1px solid rgba(160, 140, 115, 0.12);
      box-shadow: 0 16px 56px rgba(100, 80, 55, 0.14), 0 6px 20px rgba(100, 80, 55, 0.08), 0 2px 6px rgba(100, 80, 55, 0.04);
      overflow: hidden;
    }

    .conv-header {
      padding: 22px 24px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: rgba(80, 65, 50, 0.25);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 14px; height: 14px; stroke: rgba(80, 60, 40, 0.6); }

    .conv-header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: rgba(60, 48, 36, 0.8);
    }

    .conv-status {
      margin-left: auto;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(80, 65, 50, 0.35);
    }

    .conv-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .conv-messages::-webkit-scrollbar { width: 3px; }
    .conv-messages::-webkit-scrollbar-track { background: transparent; }
    .conv-messages::-webkit-scrollbar-thumb { background: rgba(80, 65, 50, 0.15); border-radius: 3px; }

    .chat-msg {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.55;
      word-break: break-word;
    }

    .chat-msg.user {
      align-self: flex-end;
      background: rgba(60, 48, 36, 0.5);
      color: rgba(255, 252, 248, 0.9);
      border-bottom-right-radius: 4px;
    }

    .chat-msg.prism {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.3);
      color: rgba(60, 48, 36, 0.75);
      border-bottom-left-radius: 4px;
    }

    .chat-msg .msg-time {
      font-size: 10px;
      opacity: 0.35;
      margin-top: 4px;
    }

    .chat-msg.user .msg-time { text-align: right; color: rgba(255,252,248,0.45); }
    .chat-msg.prism .msg-time { color: rgba(80, 65, 50, 0.35); }

    .chat-empty {
      color: rgba(80, 65, 50, 0.4);
      font-size: 13px;
      text-align: center;
      padding: 40px 24px;
      line-height: 1.7;
    }

    .conv-input {
      padding: 12px 20px 20px;
      display: flex;
      gap: 8px;
    }

    .conv-input input {
      flex: 1;
      height: 48px;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(160, 140, 115, 0.12);
      border-radius: 12px;
      padding: 0 18px;
      font-size: 14px;
      color: rgba(60, 48, 36, 0.8);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .conv-input input:focus { border-color: rgba(160, 130, 90, 0.3); }
    .conv-input input::placeholder { color: rgba(80, 65, 50, 0.3); }

    .conv-input button {
      width: 48px;
      height: 48px;
      background: rgba(60, 48, 36, 0.45);
      border: none;
      border-radius: 12px;
      color: rgba(255, 252, 248, 0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s ease, transform 0.1s ease;
      flex-shrink: 0;
    }

    .conv-input button:hover { background: rgba(60, 48, 36, 0.55); color: rgba(255, 252, 248, 0.85); }
    .conv-input button:active { transform: scale(0.95); }
    .conv-input button:disabled { opacity: 0.2; cursor: default; }

    .conv-footer {
      padding: 0 24px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(80, 65, 50, 0.3);
    }

    .conn-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
    }

    .conn-dot.disconnected { background: var(--red); }

    /* ---- Canvas (infinite pan/zoom) ---- */
    .canvas {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: var(--bg);
      cursor: grab;
    }

    .canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(175, 165, 150, 0.5) 0.8px, transparent 0.8px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .canvas.grabbing { cursor: grabbing; }

    /* Dot grid element — for pan/zoom offset */
    .canvas-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Transform layer — pans and zooms */
    .canvas-transform {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
      z-index: 1;
    }

    .canvas-content {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      min-width: 600px;
    }

    /* Zoom controls — fixed position */
    .zoom-controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 4px;
      z-index: 10;
    }

    .zoom-btn {
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 300;
      transition: all 0.15s ease;
      user-select: none;
    }

    .zoom-btn:hover { color: var(--text); border-color: #ccc; }

    .zoom-level {
      padding: 0 8px;
      height: 32px;
      display: flex;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      user-select: none;
    }

    /* Stage bar — minimal, top of canvas */
    .stage-bar {
      padding: 20px 40px 0 440px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .stage-track {
      display: flex;
      gap: 4px;
      flex: 1;
      max-width: 280px;
    }

    .stage-step {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.4s ease;
    }

    .stage-step.complete { background: var(--green); }
    .stage-step.active { background: var(--accent); }

    .stage-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .stage-label.active-label { color: var(--accent); }

    /* Toolbar — minimal, right-aligned */
    .canvas-toolbar {
      position: absolute;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 6px;
      z-index: 2;
    }

    .tool-btn {
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .tool-btn:hover { color: var(--text); border-color: #ccc; }

    /* ---- Node Graph — the living canvas ---- */
    .node-graph {
      flex: 1;
      position: relative;
      padding: 60px 40px 40px 440px;
      overflow: auto;
    }

    .node-graph svg.connections {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .connections line {
      stroke: var(--border);
      stroke-width: 1.5;
      transition: stroke 0.6s ease;
    }

    .connections line.active { stroke: var(--accent-soft); stroke-width: 2; }
    .connections line.done { stroke: var(--green); opacity: 0.5; }

    .graph-nodes {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Node row — a horizontal tier */
    .node-tier {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 16px 0;
      position: relative;
    }

    .node-tier::before {
      content: '';
      position: absolute;
      left: 50%;
      top: -16px;
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    .node-tier:first-child::before { display: none; }

    /* Individual node */
    .graph-node {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      min-width: 140px;
      max-width: 240px;
      opacity: 0;
      transform: scale(0.9) translateY(8px);
      transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      position: relative;
    }

    .graph-node.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .graph-node.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196, 120, 48, 0.1);
    }

    .graph-node.done {
      border-color: var(--green);
    }

    .graph-node.done::after {
      content: '';
      position: absolute;
      top: 10px;
      right: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .graph-node.pending {
      opacity: 0.4;
    }

    .graph-node.pending.visible {
      opacity: 0.4;
    }

    .node-type {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent-soft);
      margin-bottom: 6px;
    }

    .node-type.vision { color: var(--accent); }
    .node-type.feature { color: var(--green); }
    .node-type.ship { color: var(--yellow); }

    .node-text {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text);
    }

    .node-text.feeling {
      font-size: 28px;
      font-weight: 300;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .node-text.muted {
      color: var(--text-muted);
      opacity: 0.3;
      font-style: italic;
      font-size: 12px;
    }

    /* Center node — the vision core */
    .node-core {
      text-align: center;
    }

    .node-core .node-text {
      font-size: 16px;
      font-weight: 300;
    }

    /* Tier label */
    .tier-label {
      position: absolute;
      left: 440px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      opacity: 0.4;
    }

    /* App frame — overlays when URL is set */
    .app-overlay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 360px;
      height: 240px;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      z-index: 2;
      background: white;
      transition: all 0.3s ease;
      display: none;
    }

    .app-overlay:hover {
      width: 480px;
      height: 320px;
    }

    .app-overlay.expanded {
      inset: 60px 20px 60px 440px;
      width: auto;
      height: auto;
      border-radius: 12px;
    }

    .app-overlay iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Activity — subtle, bottom of canvas */
    .activity-bar {
      padding: 12px 40px 12px 440px;
      display: flex;
      gap: 24px;
      font-size: 11px;
      color: var(--text-muted);
      z-index: 1;
    }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .activity-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent-soft);
      opacity: 0.5;
    }

    /* ---- Settings Modal ---- */
    .settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.1);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .settings-overlay.open { display: flex; }

    .settings-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 380px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }

    .settings-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .setting-field { margin-bottom: 14px; }

    .setting-field label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .setting-field input {
      width: 100%;
      height: 40px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 13px;
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .setting-field input:focus {
      outline: none;
      border-color: var(--accent-soft);
    }

    .settings-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.15s ease;
    }

    .btn:hover { background: var(--surface-2); }

    .btn-primary {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
    }

    .btn-primary:hover { opacity: 0.9; }

    /* ---- Utility ---- */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .stage-hide { display: none !important; }
  </style>
</head>
<body>
  <div class="layout">
    <!-- LEFT: Conversation -->
    <div class="conversation">
      <div class="conv-header">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
            <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
          </svg>
        </div>
        <h1>Prism</h1>
        <span id="statusBadge" class="conv-status">visioning</span>
      </div>

      <div id="chatMessages" class="conv-messages">
        <div class="chat-empty">Tell Prism what you want to build.<br>Start with the feeling, not the feature.</div>
      </div>

      <div class="conv-input">
        <input id="chatInput" type="text" placeholder="What are you imagining?" autocomplete="off"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}" />
        <button id="chatSendBtn" onclick="sendChat()" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <div class="conv-footer">
        <div id="connDot" class="conn-dot"></div>
        <span id="connText">Watching .prism/</span>
      </div>
    </div>

    <!-- RIGHT: Canvas (infinite pan/zoom) -->
    <div id="canvas" class="canvas">
      <div id="canvasGrid" class="canvas-grid"></div>
      <div id="canvasTransform" class="canvas-transform">
        <div class="canvas-content">
          <!-- Stage bar -->
          <div class="stage-bar">
          <div id="stageTrack" class="stage-track">
            <div class="stage-step" data-stage="visioning"></div>
            <div class="stage-step" data-stage="creating"></div>
            <div class="stage-step" data-stage="polishing"></div>
            <div class="stage-step" data-stage="shipping"></div>
            <div class="stage-step" data-stage="done"></div>
          </div>
          <span id="stageLabel" class="stage-label active-label">Vision</span>
        </div>

        <!-- Toolbar -->
        <div class="canvas-toolbar">
          <button class="tool-btn" onclick="reloadFrame()" title="Reload">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
          <button class="tool-btn" onclick="openSettings()" title="Settings">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4m-9-9h4m14 0h4m-3.3-6.7-2.8 2.8M7.1 16.9l-2.8 2.8m0-13.4 2.8 2.8m9.8 9.8 2.8 2.8"/>
            </svg>
          </button>
        </div>

        <!-- Node Graph — the living canvas -->
        <div id="nodeGraph" class="node-graph">
          <div id="graphNodes" class="graph-nodes"></div>
        </div>

        <!-- App preview — floating overlay, bottom-right -->
        <div id="appOverlay" class="app-overlay">
          <iframe id="appFrame"></iframe>
        </div>

        <!-- Activity — subtle at bottom -->
        <div id="activityBar" class="activity-bar"></div>
        </div>
      </div>

      <!-- Zoom controls (fixed, not transformed) -->
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomCanvas(-0.15)" title="Zoom out">−</button>
        <div id="zoomLevel" class="zoom-level">100%</div>
        <button class="zoom-btn" onclick="zoomCanvas(0.15)" title="Zoom in">+</button>
        <button class="zoom-btn" onclick="resetCanvas()" title="Reset view" style="margin-left:4px;font-size:11px">⌂</button>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div id="settingsOverlay" class="settings-overlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-panel">
      <h2>Settings</h2>
      <div class="setting-field">
        <label>App URL</label>
        <input id="appUrlInput" type="text" placeholder="http://localhost:3000" />
      </div>
      <div class="setting-field">
        <label>State file path</label>
        <input id="statePathInput" type="text" placeholder=".prism/state.json" />
      </div>
      <div class="setting-field">
        <label>History file path</label>
        <input id="historyPathInput" type="text" placeholder=".prism/history.jsonl" />
      </div>
      <div class="setting-field">
        <label>Poll interval (ms)</label>
        <input id="pollInput" type="number" value="2000" min="500" max="30000" />
      </div>
      <div class="settings-actions">
        <button class="btn" onclick="closeSettings()">Cancel</button>
        <button class="btn btn-primary" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULTS = {
      appUrl: '',
      statePath: '.prism/state.json',
      historyPath: '.prism/history.jsonl',
      pollInterval: 2000
    };

    let config = { ...DEFAULTS, ...JSON.parse(localStorage.getItem('prism-config') || '{}') };
    let lastStateJson = '';
    let lastHistorySize = 0;
    let pollTimer = null;

    const $ = id => document.getElementById(id);

    // Settings
    function openSettings() {
      $('appUrlInput').value = config.appUrl;
      $('statePathInput').value = config.statePath;
      $('historyPathInput').value = config.historyPath;
      $('pollInput').value = config.pollInterval;
      $('settingsOverlay').classList.add('open');
    }

    function closeSettings() { $('settingsOverlay').classList.remove('open'); }

    function saveSettings() {
      config.appUrl = $('appUrlInput').value.trim();
      config.statePath = $('statePathInput').value.trim() || DEFAULTS.statePath;
      config.historyPath = $('historyPathInput').value.trim() || DEFAULTS.historyPath;
      config.pollInterval = Math.max(500, parseInt($('pollInput').value) || 2000);
      localStorage.setItem('prism-config', JSON.stringify(config));
      closeSettings();
      applyAppUrl();
      restartPolling();
    }

    // App overlay
    function applyAppUrl() {
      if (config.appUrl) {
        const overlay = $('appOverlay');
        if (overlay) { overlay.style.display = 'block';
        const f = $('appFrame'); if (f && f.src !== config.appUrl) f.src = config.appUrl; }
      } else {
        if (overlay) overlay.style.display = 'none';
        
      }
    }

    function reloadFrame() {
      if (config.appUrl) const f = $('appFrame'); if (f && f.src !== config.appUrl) f.src = config.appUrl; }
    }

    // State polling
    async function fetchState() {
      try {
        const res = await fetch('/api/state');
        if (!res.ok) throw new Error(res.statusText);
        const text = await res.text();
        if (text === lastStateJson) return;
        lastStateJson = text;
        const state = JSON.parse(text);
        renderState(state);
        $('connDot').classList.remove('disconnected');
        $('connText').textContent = 'Watching .prism/ — live';
      } catch {
        $('connDot').classList.add('disconnected');
        $('connText').textContent = 'Cannot read state';
      }
    }

    async function fetchHistory() {
      try {
        const res = await fetch('/api/history');
        if (!res.ok) return;
        const text = await res.text();
        if (text.length === lastHistorySize) return;
        lastHistorySize = text.length;
        const lines = text.trim().split('\n').filter(Boolean);
        const entries = lines.map(l => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
        renderActivity(entries.slice(-4).reverse());
      } catch {}
    }

    const STAGES = ['visioning', 'creating', 'polishing', 'shipping', 'done'];
    const STAGE_NAMES = { visioning: 'Vision', creating: 'Create', polishing: 'Polish', shipping: 'Ship', done: 'Done' };
    let lastNodeHash = '';

    function renderState(s) {
      const status = (s.status || s.mode || 'unknown').toLowerCase();

      $('statusBadge').textContent = status;

      const currentIdx = STAGES.indexOf(status);
      $('stageTrack').querySelectorAll('.stage-step').forEach((el, i) => {
        el.classList.remove('complete', 'active');
        if (i < currentIdx) el.classList.add('complete');
        else if (i === currentIdx) el.classList.add('active');
      });
      $('stageLabel').textContent = STAGE_NAMES[status] || status;
      $('stageLabel').classList.toggle('active-label', true);

      // App overlay for creating+
      if (config.appUrl && currentIdx >= 1) {
        const o = $('appOverlay');
        if (o) { o.style.display = 'block'; const f = $('appFrame'); if (f && f.src !== config.appUrl) f.src = config.appUrl; }
      } else {
        const o = $('appOverlay'); if (o) o.style.display = 'none';
      }

      renderNodeGraph(s, status);
    }

    function renderNodeGraph(s, status) {
      const v = s.vision || {};
      const features = s.features || [];
      const currentFocus = s.current_focus || '';
      const stageIdx = STAGES.indexOf(status);

      const hash = JSON.stringify({ v, features, status, currentFocus });
      if (hash === lastNodeHash) return;
      lastNodeHash = hash;

      const container = $('graphNodes');
      if (!container) return;
      let html = '';

      // Tier 1: Feeling (core node)
      const feeling = v.feeling;
      html += '<div class="node-tier">';
      html += '<div class="graph-node node-core ' + (feeling ? 'visible' : '') + '" style="transition-delay:0s">';
      html += '<div class="node-type vision">The Feeling</div>';
      html += feeling ? '<div class="node-text feeling">' + escHtml(feeling) + '</div>' : '<div class="node-text muted">Listening...</div>';
      html += '</div></div>';

      // Tier 2: Person + Moment
      html += '<div class="node-tier">';
      html += buildNode('vision', 'The Person', v.person, '0.15s');
      html += buildNode('vision', 'The Moment', v.moment, '0.3s');
      html += '</div>';

      // Tier 3: Edge
      html += '<div class="node-tier">';
      html += buildNode('vision', 'The Edge', v.edge, '0.45s');
      html += '</div>';

      // Tier 4: Intent (once vision complete)
      if (s.intent && stageIdx >= 1) {
        html += '<div class="node-tier">';
        html += '<div class="graph-node visible node-core" style="transition-delay:0.6s">';
        html += '<div class="node-type vision">Vision</div>';
        html += '<div class="node-text">' + escHtml(s.intent) + '</div>';
        html += '</div></div>';
      }

      // Tier 5+: Features (creating+)
      if (features.length > 0 && stageIdx >= 1) {
        for (let i = 0; i < features.length; i += 3) {
          const row = features.slice(i, i + 3);
          html += '<div class="node-tier">';
          row.forEach(function(f, j) {
            const isDone = f.done;
            const isActive = !isDone && f.name === currentFocus;
            const state = isDone ? 'done visible' : isActive ? 'active visible' : 'pending visible';
            const delay = (0.7 + (i + j) * 0.1).toFixed(1) + 's';
            html += '<div class="graph-node ' + state + '" style="transition-delay:' + delay + '">';
            html += '<div class="node-type feature">Feature</div>';
            html += '<div class="node-text">' + escHtml(f.name) + '</div>';
            html += '</div>';
          });
          html += '</div>';
        }
      }

      // Final: Ship node
      if (stageIdx >= 3) {
        const shipDone = stageIdx >= 4;
        html += '<div class="node-tier">';
        html += '<div class="graph-node ' + (shipDone ? 'done' : 'active') + ' visible node-core" style="transition-delay:1s">';
        html += '<div class="node-type ship">' + (shipDone ? 'Shipped' : 'Shipping') + '</div>';
        html += '<div class="node-text">' + (shipDone ? "It's live." : 'Preparing to launch...') + '</div>';
        html += '</div></div>';
      }

      container.innerHTML = html;
      requestAnimationFrame(function() {
        container.querySelectorAll('.graph-node:not(.visible)').forEach(function(el) { el.classList.add('visible'); });
      });
    }

    function buildNode(type, label, value, delay) {
      const has = !!value;
      return '<div class="graph-node ' + (has ? 'visible' : '') + '" style="transition-delay:' + delay + '">' +
        '<div class="node-type ' + type + '">' + escHtml(label) + '</div>' +
        (has ? '<div class="node-text">' + escHtml(value) + '</div>' : '<div class="node-text muted">Listening...</div>') +
        '</div>';
    }


    function renderActivity(entries) {
      if (!entries.length) return;
      $('activityBar').innerHTML = entries.map(e => {
        const t = e.ts ? timeAgo(new Date(e.ts)) : '';
        return `<div class="activity-item"><div class="activity-dot"></div>${escHtml(e.action || '')} · ${t}</div>`;
      }).join('');
    }

    function timeAgo(date) {
      const s = Math.floor((Date.now() - date.getTime()) / 1000);
      if (s < 5) return 'just now';
      if (s < 60) return s + 's ago';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm ago';
      return Math.floor(m / 60) + 'h ago';
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Chat
    let lastChatSize = 0;
    let chatMessages = [];

    async function sendChat() {
      const input = $('chatInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      // Optimistic: show message instantly
      appendLocalMsg('user', text);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (!res.ok) throw new Error('send failed');
        // Force refresh to sync with server state
        lastChatSize = 0;
        await fetchChat();
      } catch {
        appendLocalMsg('prism', 'Failed to send — is the server running?');
      }
      input.focus();
    }

    function appendLocalMsg(from, text) {
      const container = $('chatMessages');
      const empty = container.querySelector('.chat-empty');
      if (empty) empty.remove();
      const div = document.createElement('div');
      div.className = 'chat-msg ' + from;
      div.innerHTML = `${escHtml(text)}<div class="msg-time">just now</div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    async function fetchChat() {
      try {
        const res = await fetch('/api/chat');
        if (!res.ok) return;
        const text = await res.text();
        if (text.length === lastChatSize) return;
        lastChatSize = text.length;
        const lines = text.trim().split('\n').filter(Boolean);
        const entries = lines.map(l => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
        chatMessages = entries;
        renderChat(entries);
      } catch {}
    }

    function renderChat(entries) {
      const container = $('chatMessages');
      if (!entries.length) {
        container.innerHTML = '<div class="chat-empty">Tell Prism what you want to build.<br>Start with the feeling, not the feature.</div>';
        return;
      }
      container.innerHTML = entries.map(e => {
        const from = e.from === 'user' ? 'user' : 'prism';
        const t = e.ts ? timeAgo(new Date(e.ts)) : '';
        return `<div class="chat-msg ${from}">${escHtml(e.text || '')}<div class="msg-time">${t}</div></div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    // Poll
    function restartPolling() {
      if (pollTimer) clearInterval(pollTimer);
      fetchState(); fetchHistory(); fetchChat();
      pollTimer = setInterval(() => { fetchState(); fetchHistory(); }, config.pollInterval);
      // Chat polls faster for responsiveness
      setInterval(() => { fetchChat(); }, 1000);
    }


    // Pan & Zoom
    let panX = 0, panY = 0, zoom = 1;
    let isPanning = false, panStartX = 0, panStartY = 0;
    const MIN_ZOOM = 0.3, MAX_ZOOM = 3;

    function applyTransform() {
      const t = $('canvasTransform');
      if (t) t.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + zoom + ')';
      const g = $('canvasGrid');
      if (g) {
        g.style.backgroundSize = (28 * zoom) + 'px ' + (28 * zoom) + 'px';
        g.style.backgroundPosition = panX + 'px ' + panY + 'px';
      }
      const zl = $('zoomLevel');
      if (zl) zl.textContent = Math.round(zoom * 100) + '%';
    }

    function zoomCanvas(delta) {
      zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom + delta));
      applyTransform();
    }

    function resetCanvas() {
      panX = 0; panY = 0; zoom = 1;
      applyTransform();
    }

    // Mouse pan
    document.addEventListener('DOMContentLoaded', function() {
      const cv = $('canvas');
      if (!cv) return;

      cv.addEventListener('mousedown', function(e) {
        if (e.target.closest('.conversation') || e.target.closest('.canvas-toolbar') || e.target.closest('.zoom-controls') || e.target.closest('.app-overlay') || e.target.closest('.tool-btn')) return;
        isPanning = true;
        panStartX = e.clientX - panX;
        panStartY = e.clientY - panY;
        cv.classList.add('grabbing');
        e.preventDefault();
      });

      window.addEventListener('mousemove', function(e) {
        if (!isPanning) return;
        panX = e.clientX - panStartX;
        panY = e.clientY - panStartY;
        applyTransform();
      });

      window.addEventListener('mouseup', function() {
        if (isPanning) {
          isPanning = false;
          cv.classList.remove('grabbing');
        }
      });

      // Wheel zoom (pinch on trackpad)
      cv.addEventListener('wheel', function(e) {
        if (e.target.closest('.conversation') || e.target.closest('.canvas-toolbar') || e.target.closest('.zoom-controls') || e.target.closest('.app-overlay')) return;
        e.preventDefault();

        // Zoom toward cursor
        const rect = cv.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const oldZoom = zoom;
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom + delta));

        // Adjust pan to zoom toward cursor
        const scale = zoom / oldZoom;
        panX = mx - scale * (mx - panX);
        panY = my - scale * (my - panY);

        applyTransform();
      }, { passive: false });
    });

    // Init
    applyAppUrl();
    restartPolling();
    $('chatInput').focus();
  </script>
</body>
</html>
