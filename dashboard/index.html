<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prism</title>
  <style>
    :root {
      --bg: #faf8f5;
      --surface: #ffffff;
      --surface-2: #f3f0eb;
      --border: #e8e4dd;
      --text: #2c2925;
      --text-muted: #9a9590;
      --accent: #c47830;
      --accent-soft: #b8845a;
      --green: #5a9a6b;
      --yellow: #b8943a;
      --red: #b85a50;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .layout {
      position: relative;
      height: 100vh;
    }

    /* ---- LEFT: Conversation (floating) ---- */
    .conversation {
      position: absolute;
      left: 24px;
      top: 64px;
      bottom: 24px;
      width: 340px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
      background: rgba(180, 156, 132, 0.35);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 28px;
      border: 1px solid rgba(160, 140, 115, 0.12);
      box-shadow: 0 16px 56px rgba(100, 80, 55, 0.14), 0 6px 20px rgba(100, 80, 55, 0.08), 0 2px 6px rgba(100, 80, 55, 0.04);
      overflow: hidden;
    }

    .canvas-logo {
      position: absolute;
      top: 22px;
      left: 28px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 9px;
      pointer-events: none;
    }

    .canvas-logo svg {
      width: 18px;
      height: 18px;
      color: rgba(80, 65, 50, 0.4);
    }

    .canvas-logo span {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: rgba(60, 48, 36, 0.45);
    }

    .conv-header {
      padding: 16px 20px 10px;
      display: flex;
      align-items: center;
    }

    .conv-status {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(80, 65, 50, 0.35);
    }

    .conv-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .conv-messages::-webkit-scrollbar { width: 3px; }
    .conv-messages::-webkit-scrollbar-track { background: transparent; }
    .conv-messages::-webkit-scrollbar-thumb { background: rgba(80, 65, 50, 0.15); border-radius: 3px; }

    .chat-msg {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.55;
      word-break: break-word;
    }

    .chat-msg.user {
      align-self: flex-end;
      background: rgba(60, 48, 36, 0.5);
      color: rgba(255, 252, 248, 0.9);
      border-bottom-right-radius: 4px;
    }

    .chat-msg.prism {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.3);
      color: rgba(60, 48, 36, 0.75);
      border-bottom-left-radius: 4px;
    }

    .chat-msg .msg-time {
      font-size: 10px;
      opacity: 0.35;
      margin-top: 4px;
    }

    .chat-msg.user .msg-time { text-align: right; color: rgba(255,252,248,0.45); }
    .chat-msg.prism .msg-time { color: rgba(80, 65, 50, 0.35); }

    .chat-empty {
      color: rgba(80, 65, 50, 0.4);
      font-size: 13px;
      text-align: center;
      padding: 40px 24px;
      line-height: 1.7;
    }

    .conv-input {
      padding: 12px 20px 20px;
      display: flex;
      gap: 8px;
    }

    .conv-input input {
      flex: 1;
      height: 48px;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(160, 140, 115, 0.12);
      border-radius: 12px;
      padding: 0 18px;
      font-size: 14px;
      color: rgba(60, 48, 36, 0.8);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .conv-input input:focus { border-color: rgba(160, 130, 90, 0.3); }
    .conv-input input::placeholder { color: rgba(80, 65, 50, 0.3); }

    .conv-input button {
      width: 48px;
      height: 48px;
      background: rgba(60, 48, 36, 0.45);
      border: none;
      border-radius: 12px;
      color: rgba(255, 252, 248, 0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s ease, transform 0.1s ease;
      flex-shrink: 0;
    }

    .conv-input button:hover { background: rgba(60, 48, 36, 0.55); color: rgba(255, 252, 248, 0.85); }
    .conv-input button:active { transform: scale(0.95); }
    .conv-input button:disabled { opacity: 0.2; cursor: default; }

    .conv-footer {
      padding: 0 24px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(80, 65, 50, 0.3);
    }

    .conn-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
    }

    .conn-dot.disconnected { background: var(--red); }

    /* ---- Canvas (infinite pan/zoom) ---- */
    .canvas {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: var(--bg);
      cursor: grab;
      /* clip is needed for pan/zoom, but transform layer handles visibility */
    }

    .canvas.grabbing { cursor: grabbing; }

    /* Dot grid — moves with pan/zoom */
    .canvas-grid {
      position: absolute;
      inset: -200px;
      background-image: radial-gradient(circle, rgba(160, 145, 128, 0.65) 1.1px, transparent 1.1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    /* Transform layer — pans and zooms */
    .canvas-transform {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
      z-index: 1;
    }

    /* Zoom controls — fixed position */
    .zoom-controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 4px;
      z-index: 10;
    }

    .zoom-btn {
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 300;
      transition: all 0.15s ease;
      user-select: none;
    }

    .zoom-btn:hover { color: var(--text); border-color: #ccc; }

    .zoom-level {
      padding: 0 8px;
      height: 32px;
      display: flex;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      user-select: none;
    }

    /* Stage bar — minimal, top of canvas */
    .stage-bar {
      position: absolute;
      top: 16px;
      left: 440px;
      z-index: 5;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .stage-track {
      display: flex;
      gap: 4px;
      flex: 1;
      max-width: 280px;
    }

    .stage-step {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.4s ease;
    }

    .stage-step.complete { background: var(--green); }
    .stage-step.active { background: var(--accent); }

    .stage-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .stage-label.active-label { color: var(--accent); }

    /* Toolbar — minimal, right-aligned */
    .canvas-toolbar {
      position: absolute;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 6px;
      z-index: 2;
    }

    .tool-btn {
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .tool-btn:hover { color: var(--text); border-color: #ccc; }

    .graph-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 2000px;
      height: 2000px;
      z-index: 0;
      overflow: visible;
    }

    .graph-lines line {
      stroke: var(--border);
      stroke-width: 1.5;
      opacity: 0.6;
    }

    .graph-lines line.vision { stroke: var(--accent-soft); }
    .graph-lines line.feature { stroke: var(--green); opacity: 0.3; }
    .graph-lines line.persist { stroke: #60a5fa; opacity: 0.3; }

    .graph-nodes {
      position: absolute;
      top: 0;
      left: 0;
      width: 2000px;
      height: 2000px;
      z-index: 1;
    }



    /* Individual node */
    .graph-node {
      position: absolute;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      width: 200px;
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      pointer-events: auto;
      cursor: default;
    }

    .graph-node.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .graph-node.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196, 120, 48, 0.1);
    }

    .graph-node.done {
      border-color: var(--green);
    }

    .graph-node.done::after {
      content: '';
      position: absolute;
      top: 10px;
      right: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .graph-node.pending {
      opacity: 0.4;
    }

    .graph-node.pending.visible {
      opacity: 0.4;
    }

    .node-type {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent-soft);
      margin-bottom: 6px;
    }

    .node-type.vision { color: var(--accent); }
    .node-type.feature { color: var(--green); }
    .node-type.ship { color: var(--yellow); }
    .node-type.persist { color: #60a5fa; }
    .node-type.polish { color: var(--accent-soft); }

    .node-text {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text);
    }

    .node-text.feeling {
      font-size: 28px;
      font-weight: 300;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .node-text.muted {
      color: var(--text-muted);
      opacity: 0.3;
      font-style: italic;
      font-size: 12px;
    }

    .graph-node.root {
      width: 240px;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(196, 120, 48, 0.08);
    }

    /* App frame — overlays when URL is set */
    .app-overlay {
      position: absolute;
      bottom: 60px;
      right: 20px;
      z-index: 5;
      width: 360px;
      height: 240px;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      z-index: 2;
      background: white;
      transition: all 0.3s ease;
      display: none;
    }

    .app-overlay:hover {
      width: 480px;
      height: 320px;
    }

    .app-overlay.expanded {
      inset: 60px 20px 60px 440px;
      width: auto;
      height: auto;
      border-radius: 12px;
    }

    .app-overlay iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Activity — subtle, bottom of canvas */
    .activity-bar {
      position: absolute;
      bottom: 12px;
      left: 440px;
      right: 20px;
      z-index: 5;
      padding: 0;
      display: flex;
      gap: 24px;
      font-size: 11px;
      color: var(--text-muted);
      z-index: 1;
    }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .activity-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent-soft);
      opacity: 0.5;
    }

    /* ---- Settings Modal ---- */
    .settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.1);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .settings-overlay.open { display: flex; }

    .settings-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 380px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }

    .settings-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .setting-field { margin-bottom: 14px; }

    .setting-field label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .setting-field input {
      width: 100%;
      height: 40px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 13px;
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .setting-field input:focus {
      outline: none;
      border-color: var(--accent-soft);
    }

    .settings-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.15s ease;
    }

    .btn:hover { background: var(--surface-2); }

    .btn-primary {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
    }

    .btn-primary:hover { opacity: 0.9; }

    /* ---- Utility ---- */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .stage-hide { display: none !important; }
  </style>
</head>
<body>
  <div class="layout">
    <!-- LEFT: Conversation -->
    <div class="conversation">
      <div class="conv-header">
        <span id="statusBadge" class="conv-status">visioning</span>
      </div>

      <div id="chatMessages" class="conv-messages">
        <div class="chat-empty">Tell Prism what you want to build.<br>Start with the feeling, not the feature.</div>
      </div>

      <div class="conv-input">
        <input id="chatInput" type="text" placeholder="What are you imagining?" autocomplete="off"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}" />
        <button id="chatSendBtn" onclick="sendChat()" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <div class="conv-footer">
        <div id="connDot" class="conn-dot"></div>
        <span id="connText">Watching .prism/</span>
      </div>
    </div>

    <!-- Canvas logo -->
    <div class="canvas-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
      </svg>
      <span>Prism</span>
    </div>

    <!-- RIGHT: Canvas (infinite pan/zoom) -->
    <div id="canvas" class="canvas">
      <div id="canvasGrid" class="canvas-grid"></div>
      <!-- Pan/zoom transform layer — contains ONLY the node graph -->
      <div id="canvasTransform" class="canvas-transform">
        <svg id="graphLines" class="graph-lines"></svg>
        <div id="graphNodes" class="graph-nodes"></div>
      </div>

      <!-- Stage bar — fixed, not transformed -->
      <div class="stage-bar">
        <div id="stageTrack" class="stage-track">
          <div class="stage-step" data-stage="visioning"></div>
          <div class="stage-step" data-stage="creating"></div>
          <div class="stage-step" data-stage="polishing"></div>
          <div class="stage-step" data-stage="shipping"></div>
          <div class="stage-step" data-stage="done"></div>
        </div>
        <span id="stageLabel" class="stage-label active-label">Vision</span>
      </div>

      <!-- Activity bar — fixed at bottom -->
      <div id="activityBar" class="activity-bar"></div>

      <!-- App preview — fixed overlay -->
      <div id="appOverlay" class="app-overlay">
        <iframe id="appFrame"></iframe>
      </div>

      <!-- Zoom controls (fixed, not transformed) -->
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomCanvas(-0.15)" title="Zoom out">−</button>
        <div id="zoomLevel" class="zoom-level">100%</div>
        <button class="zoom-btn" onclick="zoomCanvas(0.15)" title="Zoom in">+</button>
        <button class="zoom-btn" onclick="resetCanvas()" title="Reset view" style="margin-left:4px;font-size:11px">⌂</button>
        <button class="zoom-btn" onclick="openSettings()" title="Settings" style="margin-left:4px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4m-9-9h4m14 0h4m-3.3-6.7-2.8 2.8M7.1 16.9l-2.8 2.8m0-13.4 2.8 2.8m9.8 9.8 2.8 2.8"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div id="settingsOverlay" class="settings-overlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-panel">
      <h2>Settings</h2>
      <div class="setting-field">
        <label>App URL</label>
        <input id="appUrlInput" type="text" placeholder="http://localhost:3000" />
      </div>
      <div class="setting-field">
        <label>State file path</label>
        <input id="statePathInput" type="text" placeholder=".prism/state.json" />
      </div>
      <div class="setting-field">
        <label>History file path</label>
        <input id="historyPathInput" type="text" placeholder=".prism/history.jsonl" />
      </div>
      <div class="setting-field">
        <label>Poll interval (ms)</label>
        <input id="pollInput" type="number" value="2000" min="500" max="30000" />
      </div>
      <div class="settings-actions">
        <button class="btn" onclick="closeSettings()">Cancel</button>
        <button class="btn btn-primary" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULTS = {
      appUrl: '',
      statePath: '.prism/state.json',
      historyPath: '.prism/history.jsonl',
      pollInterval: 2000
    };

    let config = { ...DEFAULTS, ...JSON.parse(localStorage.getItem('prism-config') || '{}') };
    let lastStateJson = '';
    let lastHistorySize = 0;
    let pollTimer = null;

    const $ = id => document.getElementById(id);

    // Settings
    function openSettings() {
      $('appUrlInput').value = config.appUrl;
      $('statePathInput').value = config.statePath;
      $('historyPathInput').value = config.historyPath;
      $('pollInput').value = config.pollInterval;
      $('settingsOverlay').classList.add('open');
    }

    function closeSettings() { $('settingsOverlay').classList.remove('open'); }

    function saveSettings() {
      config.appUrl = $('appUrlInput').value.trim();
      config.statePath = $('statePathInput').value.trim() || DEFAULTS.statePath;
      config.historyPath = $('historyPathInput').value.trim() || DEFAULTS.historyPath;
      config.pollInterval = Math.max(500, parseInt($('pollInput').value) || 2000);
      localStorage.setItem('prism-config', JSON.stringify(config));
      closeSettings();
      applyAppUrl();
      restartPolling();
    }

    // App overlay
    function applyAppUrl() {
      var overlay = $('appOverlay');
      var frame = $('appFrame');
      if (config.appUrl) {
        if (overlay) overlay.style.display = 'block';
        if (frame && frame.src !== config.appUrl) frame.src = config.appUrl;
      } else {
        if (overlay) overlay.style.display = 'none';
      }
    }

    function reloadFrame() {
      var frame = $('appFrame');
      if (config.appUrl && frame) frame.src = config.appUrl;
    }

    // State polling
    async function fetchState() {
      try {
        const res = await fetch('/api/state');
        if (!res.ok) throw new Error(res.statusText);
        const text = await res.text();
        if (text === lastStateJson) return;
        lastStateJson = text;
        const state = JSON.parse(text);
        renderState(state);
        $('connDot').classList.remove('disconnected');
        $('connText').textContent = 'Watching .prism/ — live';
      } catch {
        $('connDot').classList.add('disconnected');
        $('connText').textContent = 'Cannot read state';
      }
    }

    async function fetchHistory() {
      try {
        const res = await fetch('/api/history');
        if (!res.ok) return;
        const text = await res.text();
        if (text.length === lastHistorySize) return;
        lastHistorySize = text.length;
        const lines = text.trim().split('\n').filter(Boolean);
        const entries = lines.map(l => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
        renderActivity(entries.slice(-4).reverse());
      } catch {}
    }

    const STAGES = ['visioning', 'creating', 'polishing', 'shipping', 'done'];
    const STAGE_NAMES = { visioning: 'Vision', creating: 'Create', polishing: 'Polish', shipping: 'Ship', done: 'Done' };
    let lastNodeHash = '';

    function renderState(s) {
      const status = (s.status || s.mode || 'unknown').toLowerCase();

      $('statusBadge').textContent = status;

      const currentIdx = STAGES.indexOf(status);
      $('stageTrack').querySelectorAll('.stage-step').forEach((el, i) => {
        el.classList.remove('complete', 'active');
        if (i < currentIdx) el.classList.add('complete');
        else if (i === currentIdx) el.classList.add('active');
      });
      $('stageLabel').textContent = STAGE_NAMES[status] || status;
      $('stageLabel').classList.toggle('active-label', true);

      // App overlay for creating+
      if (config.appUrl && currentIdx >= 1) {
        const o = $('appOverlay');
        if (o) { o.style.display = 'block'; const f = $('appFrame'); if (f && f.src !== config.appUrl) f.src = config.appUrl; }
      } else {
        const o = $('appOverlay'); if (o) o.style.display = 'none';
      }

      renderNodeGraph(s, status);
    }

    // Story-driven node graph
    let storyData = null;
    let lastStoryLen = 0;

    async function fetchStory() {
      try {
        const res = await fetch('/api/story');
        if (!res.ok) return;
        const data = await res.json();
        if (!data.nodes || data.nodes.length === 0) return;
        if (data.nodes.length === lastStoryLen) return;
        lastStoryLen = data.nodes.length;
        storyData = data;
        renderStoryGraph(data);
      } catch (e) { console.error('fetchStory error:', e); }
    }

    function renderStoryGraph(data) {
      const nodes = data.nodes || [];
      if (!nodes.length) return;

      const container = $('graphNodes');
      const svgEl = $('graphLines');
      if (!container || !svgEl) return;

      // Layout: tree from root. Build parent→children map
      const byId = {};
      const children = {};
      nodes.forEach(function(n) { byId[n.id] = n; children[n.id] = []; });
      const roots = [];
      nodes.forEach(function(n) {
        if (n.parent && byId[n.parent]) {
          children[n.parent].push(n.id);
        } else {
          roots.push(n.id);
        }
      });

      // Assign positions via BFS — tree layout
      const positions = {};
      const NODE_W = 200, NODE_H = 80, GAP_X = 40, GAP_Y = 100;
      const CX = 600; // center X

      // BFS to compute depth and horizontal spread
      const depths = {};
      const depthNodes = {};
      const queue = roots.map(function(id) { return { id: id, depth: 0 }; });
      const visited = new Set();

      while (queue.length > 0) {
        const item = queue.shift();
        if (visited.has(item.id)) continue;
        visited.add(item.id);
        depths[item.id] = item.depth;
        if (!depthNodes[item.depth]) depthNodes[item.depth] = [];
        depthNodes[item.depth].push(item.id);

        var ch = children[item.id] || [];
        for (var ci = 0; ci < ch.length; ci++) {
          if (!visited.has(ch[ci])) {
            queue.push({ id: ch[ci], depth: item.depth + 1 });
          }
        }
      }

      // Position nodes: center each depth row
      const maxDepth = Math.max.apply(null, Object.keys(depthNodes).map(Number));
      for (var d = 0; d <= maxDepth; d++) {
        var row = depthNodes[d] || [];
        var totalW = row.length * NODE_W + (row.length - 1) * GAP_X;
        var startX = CX - totalW / 2;
        for (var ri = 0; ri < row.length; ri++) {
          positions[row[ri]] = {
            x: startX + ri * (NODE_W + GAP_X),
            y: 40 + d * (NODE_H + GAP_Y)
          };
        }
      }

      // Render SVG lines
      var lines = '';
      nodes.forEach(function(n) {
        if (!n.parent || !positions[n.id] || !positions[n.parent]) return;
        var from = positions[n.parent];
        var to = positions[n.id];
        var lineClass = n.type || 'feature';
        lines += '<line class="' + lineClass + '" x1="' + (from.x + NODE_W/2) + '" y1="' + (from.y + NODE_H) +
                 '" x2="' + (to.x + NODE_W/2) + '" y2="' + to.y + '"/>';
      });
      svgEl.innerHTML = lines;

      // Render nodes
      var html = '';
      nodes.forEach(function(n, i) {
        var pos = positions[n.id];
        if (!pos) return;
        var isRoot = !n.parent || !byId[n.parent];
        var delay = (i * 0.05).toFixed(2) + 's';
        html += '<div class="graph-node visible ' + (isRoot ? 'root' : '') + '"' +
                ' style="left:' + pos.x + 'px;top:' + pos.y + 'px;transition-delay:' + delay + '"' +
                ' title="' + escHtml(n.summary) + '">';
        html += '<div class="node-type ' + n.type + '">' + escHtml(n.phase || n.type) + '</div>';
        html += '<div class="node-text">' + escHtml(n.action) + '</div>';
        html += '</div>';
      });
      container.innerHTML = html;

      requestAnimationFrame(function() {
        container.querySelectorAll('.graph-node:not(.visible)').forEach(function(el) { el.classList.add('visible'); });
      });
    }

    function renderNodeGraph(s, status) {
      // If we have story data, story graph takes priority
      if (storyData && storyData.nodes && storyData.nodes.length > 0) return;
      // Fallback: render from state only (no history yet)
      var container = $('graphNodes');
      if (!container) return;
      var v = s.vision || {};
      if (!v.feeling && !v.person) { container.innerHTML = ''; return; }
      // Minimal: just show vision facets as nodes
      var html = '';
      var cy = 60;
      if (v.feeling) {
        html += '<div class="graph-node visible root" style="left:500px;top:' + cy + 'px"><div class="node-type vision">The Feeling</div><div class="node-text feeling">' + escHtml(v.feeling) + '</div></div>';
        cy += 120;
      }
      if (v.person) {
        html += '<div class="graph-node visible" style="left:380px;top:' + cy + 'px"><div class="node-type vision">The Person</div><div class="node-text">' + escHtml(v.person) + '</div></div>';
      }
      if (v.moment) {
        html += '<div class="graph-node visible" style="left:640px;top:' + cy + 'px"><div class="node-type vision">The Moment</div><div class="node-text">' + escHtml(v.moment) + '</div></div>';
      }
      cy += 120;
      if (v.edge) {
        html += '<div class="graph-node visible" style="left:500px;top:' + cy + 'px"><div class="node-type vision">The Edge</div><div class="node-text">' + escHtml(v.edge) + '</div></div>';
      }
      container.innerHTML = html;
    }


    function renderActivity(entries) {
      if (!entries.length) return;
      $('activityBar').innerHTML = entries.map(e => {
        const t = e.ts ? timeAgo(new Date(e.ts)) : '';
        return `<div class="activity-item"><div class="activity-dot"></div>${escHtml(e.action || '')} · ${t}</div>`;
      }).join('');
    }

    function timeAgo(date) {
      const s = Math.floor((Date.now() - date.getTime()) / 1000);
      if (s < 5) return 'just now';
      if (s < 60) return s + 's ago';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm ago';
      return Math.floor(m / 60) + 'h ago';
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Chat
    let lastChatSize = 0;
    let chatMessages = [];

    async function sendChat() {
      const input = $('chatInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      // Optimistic: show message instantly
      appendLocalMsg('user', text);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (!res.ok) throw new Error('send failed');
        // Force refresh to sync with server state
        lastChatSize = 0;
        await fetchChat();
      } catch {
        appendLocalMsg('prism', 'Failed to send — is the server running?');
      }
      input.focus();
    }

    function appendLocalMsg(from, text) {
      const container = $('chatMessages');
      const empty = container.querySelector('.chat-empty');
      if (empty) empty.remove();
      const div = document.createElement('div');
      div.className = 'chat-msg ' + from;
      div.innerHTML = `${escHtml(text)}<div class="msg-time">just now</div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    async function fetchChat() {
      try {
        const res = await fetch('/api/chat');
        if (!res.ok) return;
        const text = await res.text();
        if (text.length === lastChatSize) return;
        lastChatSize = text.length;
        const lines = text.trim().split('\n').filter(Boolean);
        const entries = lines.map(l => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
        chatMessages = entries;
        renderChat(entries);
      } catch {}
    }

    function renderChat(entries) {
      const container = $('chatMessages');
      if (!entries.length) {
        container.innerHTML = '<div class="chat-empty">Tell Prism what you want to build.<br>Start with the feeling, not the feature.</div>';
        return;
      }
      container.innerHTML = entries.map(e => {
        const from = e.from === 'user' ? 'user' : 'prism';
        const t = e.ts ? timeAgo(new Date(e.ts)) : '';
        return `<div class="chat-msg ${from}">${escHtml(e.text || '')}<div class="msg-time">${t}</div></div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    // Poll
    function restartPolling() {
      if (pollTimer) clearInterval(pollTimer);
      fetchState(); fetchHistory(); fetchChat(); fetchStory();
      pollTimer = setInterval(() => { fetchState(); fetchHistory(); fetchStory(); }, config.pollInterval);
      // Chat polls faster for responsiveness
      setInterval(() => { fetchChat(); }, 1000);
    }


    // Pan & Zoom
    let panX = 0, panY = 0, zoom = 1;
    let isPanning = false, panStartX = 0, panStartY = 0;
    const MIN_ZOOM = 0.3, MAX_ZOOM = 3;

    function applyTransform() {
      const t = $('canvasTransform');
      if (t) t.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + zoom + ')';
      const g = $('canvasGrid');
      if (g) {
        g.style.backgroundSize = (30 * zoom) + 'px ' + (30 * zoom) + 'px';
        g.style.backgroundPosition = panX + 'px ' + panY + 'px';
      }
      const zl = $('zoomLevel');
      if (zl) zl.textContent = Math.round(zoom * 100) + '%';
    }

    function zoomCanvas(delta) {
      zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom + delta));
      applyTransform();
    }

    function resetCanvas() {
      panX = 200; panY = 50; zoom = 0.8;
      applyTransform();
    }

    // Mouse pan
    document.addEventListener('DOMContentLoaded', function() {
      const cv = $('canvas');
      if (!cv) return;

      function isCanvasDrag(e) {
        return !e.target.closest('.conversation') && !e.target.closest('.zoom-controls') &&
               !e.target.closest('.app-overlay') && !e.target.closest('.settings-overlay') &&
               !e.target.closest('.canvas-logo') && !e.target.closest('button') && !e.target.closest('input');
      }

      document.addEventListener('mousedown', function(e) {
        if (!isCanvasDrag(e)) return;
        isPanning = true;
        panStartX = e.clientX - panX;
        panStartY = e.clientY - panY;
        cv.classList.add('grabbing');
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!isPanning) return;
        panX = e.clientX - panStartX;
        panY = e.clientY - panStartY;
        applyTransform();
      });

      document.addEventListener('mouseup', function() {
        if (isPanning) {
          isPanning = false;
          cv.classList.remove('grabbing');
        }
      });

      // Wheel zoom (pinch on trackpad)
      cv.addEventListener('wheel', function(e) {
        if (!isCanvasDrag(e)) return;
        e.preventDefault();

        // Zoom toward cursor
        const rect = cv.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const oldZoom = zoom;
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom + delta));

        // Adjust pan to zoom toward cursor
        const scale = zoom / oldZoom;
        panX = mx - scale * (mx - panX);
        panY = my - scale * (my - panY);

        applyTransform();
      }, { passive: false });
    });

    // Init
    panX = 200; panY = 50; zoom = 0.8;
    applyTransform();
    restartPolling();
    $('chatInput').focus();
  </script>
</body>
</html>
